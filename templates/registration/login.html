{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-wrench-adjustable me-2"></i>Area Riservata</h2>
            <p class="text-muted">Inserisci le credenziali per accedere al gestionale</p>
        </div>
        <div class="card p-4">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        {{ form.password }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">ACCEDI</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Pulizia campi form django nel login */
    input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.6rem; }
</style>
{% endblock %}
