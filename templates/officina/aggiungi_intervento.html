{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h3>Aggiungi intervento a Ordine #{{ ordine.id }}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Aggiungi</button>
        <a class="btn btn-secondary" href="{% url 'officina:dettaglio_ordine' ordine.id %}">Annulla</a>
    </form>
</div>
{% endblock %}
